<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#4d726d"/>
      <stop offset="100%" stop-color="#3d5c58"/>
    </linearGradient>
  </defs>

  <!-- Rounded square background -->
  <rect width="100" height="100" rx="18" fill="url(#bg)"/>

  <!-- Cursive A stroke -->
  <g transform="translate(2, -2)">
    <!-- Main A stroke -->
    <path
      d="M25,78 C25,78 30,72 35,60 C40,48 48,28 55,22 C58,19 60,20 61,22 C64,28 68,42 72,55 C74,61 76,66 78,70"
      fill="none" stroke="#f0ebe4" stroke-width="2.8" stroke-linecap="round"
    />
    <!-- Left swash/loop -->
    <path
      d="M25,78 C20,82 15,84 14,80 C12,74 18,68 28,65 C35,63 40,63 45,64"
      fill="none" stroke="#f0ebe4" stroke-width="2.8" stroke-linecap="round"
    />
    <!-- Right tail -->
    <path
      d="M78,70 C80,74 83,78 86,78 C89,78 90,75 88,72"
      fill="none" stroke="#f0ebe4" stroke-width="2.8" stroke-linecap="round"
    />
    <!-- Crossbar -->
    <line x1="30" y1="58" x2="75" y2="58" stroke="#f0ebe4" stroke-width="1.8" stroke-linecap="round"/>
  </g>
</svg>
